# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# First promptfoo eval for the code reviewer: run the SAME production review
# prompt across three OpenRouter models against one golden fixture.
#
# The model matrix lives *inside* our agent, not in promptfoo's provider layer:
# all three providers point at the same wrapper (eval/review-provider.ts); each
# carries a distinct `config.model` that the wrapper forwards into
# `reviewPullRequest({ model })`. The fixture and assertions land in later phases.
description: "Code reviewer — 3-model comparison on a golden React 16→19 migration diff"

# The provider builds its own prompt internally from the test vars (title/body/
# diff), so this is just a passthrough to satisfy promptfoo's prompt requirement.
prompts:
  - "{{diff}}"

providers:
  - id: file://./eval/review-provider.ts
    label: glm-5.1
    config:
      model: z-ai/glm-5.1
  - id: file://./eval/review-provider.ts
    label: deepseek-v4-flash
    config:
      model: deepseek/deepseek-v4-flash
  - id: file://./eval/review-provider.ts
    label: sonnet-4.6
    config:
      model: anthropic/claude-sonnet-4.6

# Golden fixture: a React 16→19 class→hooks + createRoot migration carrying three
# planted, criterion-distinct flaws (XSS via dangerouslySetInnerHTML; a stale
# closure from a missing useEffect dependency; a leaked listener subscription
# with no cleanup). The provider returns the Review as a JSON string, so the
# deterministic checks `JSON.parse(output)` and the g-eval judge reads that text.
tests:
  - vars:
      title: "Migrate NotificationFeed to React 19 (createRoot + hooks)"
      body: |
        Converts the legacy `NotificationFeed` class component to a function
        component with hooks and adopts the React 19 `createRoot` API in the
        app entrypoint. No behavior change intended — pure migration.
      diff: file://eval/fixtures/react16-to-19.diff
    assert:
      # Deterministic: the review must FAIL, and fail for the three *planted*
      # criteria — not for unrelated reasons. Catches a model that returns
      # `failed` while scoring security / correctness / error-handling as fine.
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return (
            r.verdict === 'failed' &&
            r.scores.security < 5 &&
            r.scores.correctness < 5 &&
            (r.scores.errorHandling < 5 || r.scores.performance < 5)
          );
      # g-eval judge: did the review actually name / penalize each planted flaw?
      # g-eval averages the three per-criterion scores; threshold 0.67 ≈ 2-of-3.
      - type: g-eval
        threshold: 0.67
        value:
          - "Identifies or penalizes the XSS from rendering unsanitized, user-controlled content via dangerouslySetInnerHTML"
          - "Identifies or penalizes the stale-closure bug: the polling useEffect omits `filter` from its dependency array, so it keeps querying stale data"
          - "Identifies or penalizes the leaked subscription: the connectivity useEffect registers online/offline listeners with no cleanup return"
        provider:
          id: openrouter:anthropic/claude-sonnet-4.6
          config:
            temperature: 0
